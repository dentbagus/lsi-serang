<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSI Serang</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Mengatur video dan gambar agar memenuhi layar penuh */
        #videoPlayer, #imagePlayer {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            display: none; /* Sembunyikan secara default */
        }
    </style>
</head>
<body>

    <video id="videoPlayer" autoplay muted playsinline></video>
    <img id="imagePlayer" alt="Slideshow Image">

    <script>
        // 1. DAFTAR PLAYLIST (Bisa dicampur Video dan Gambar)
        const playlist = [
            "../include/assets/video/pilar1.mp4"
        ];

        // 2. DURASI TAMPILAN GAMBAR (Dalam satuan milidetik. 5000ms = 5 detik)
        const imageDuration = 5000; 

        let currentMediaIndex = 0;
        let imageTimer = null;
        
        const videoElement = document.getElementById('videoPlayer');
        const imageElement = document.getElementById('imagePlayer');

        // 3. Fungsi utama untuk memutar media
        function playMedia(index) {
            if (playlist.length === 0) return;
            
            // Bersihkan timer gambar sebelumnya jika ada
            clearTimeout(imageTimer);

            const mediaUrl = playlist[index];
            
            // Cek apakah file adalah gambar berdasarkan ekstensinya (.jpg, .jpeg, .png, .webp)
            const isImage = /\.(jpg|jpeg|png|webp)$/i.test(mediaUrl);

            if (isImage) {
                // Tampilkan Gambar, Sembunyikan Video
                videoElement.style.display = 'none';
                videoElement.pause();
                
                imageElement.src = mediaUrl;
                imageElement.style.display = 'block';

                // Atur waktu tayang gambar sebelum pindah ke media berikutnya
                imageTimer = setTimeout(nextMedia, imageDuration);
            } else {
                // Tampilkan Video, Sembunyikan Gambar
                imageElement.style.display = 'none';
                
                videoElement.src = mediaUrl;
                videoElement.style.display = 'block';
                videoElement.play().catch(error => {
                    console.log("Autoplay ditolak, mencoba lagi...", error);
                });
            }
        }

        // 4. Fungsi untuk bergeser ke media berikutnya
        function nextMedia() {
            currentMediaIndex++;

            // Jika sudah di akhir playlist, refresh halaman agar RAM TV bersih kembali
            if (currentMediaIndex >= playlist.length) {
                console.log("Satu siklus selesai, merestart halaman...");
                location.reload();
                return;
            }

            playMedia(currentMediaIndex);
        }

        // Event ketika video selesai diputar
        videoElement.addEventListener('ended', nextMedia);

        // Proteksi eror jika file video/gambar rusak atau gagal load
        videoElement.addEventListener('error', function() {
            console.log("Video error, skip ke media berikutnya...");
            setTimeout(nextMedia, 2000);
        });
        imageElement.addEventListener('error', function() {
            console.log("Gambar error, skip ke media berikutnya...");
            nextMedia();
        });

        // Mulai jalankan saat halaman terbuka
        window.onload = function() {
            playMedia(currentMediaIndex);
        };
    </script>

</body>
</html>
