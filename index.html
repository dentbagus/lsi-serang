<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSI Serang</title>
    <style>
        /* Membuat halaman benar-benar hitam dan menghilangkan scrollbar */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Membuat video memenuhi seluruh layar (Fullscreen) */
        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Mengisi layar penuh tanpa merusak rasio video */
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <video id="videoPlayer" autoplay muted playsinline></video>

    <script>
        // 1. DAFTAR VIDEO KAMU
        const playlist = [
            "include/assets/video/Bulgogi Kimbap_HD.mp4",
            "include/assets/video/DID Fresh Nutritious Sushi.mp4",
            "include/assets/video/DID Kimbap.mp4",
            "include/assets/video/DID SUSHI NATURE RECOMMENDATION.mp4",
            "include/assets/video/Salmon Nigiri_HD.mp4",
            "include/assets/video/Spicy Dakgangjeong_HD.mp4",
            "include/assets/video/Toppoki_HD.mp4"
        ];

        let currentVideoIndex = 0;
        const videoElement = document.getElementById('videoPlayer');

        // 2. Fungsi untuk memutar video berdasarkan index
        function playVideo(index) {
            if (playlist.length === 0) return;
            
            videoElement.src = playlist[index];
            videoElement.play().catch(error => {
                console.log("Autoplay dicegah oleh browser, mencoba memutar lagi...", error);
            });
        }

        // 3. Event Listener: Ketika video yang sekarang SELESAI diputar
        videoElement.addEventListener('ended', function() {
            // Naikkan index ke video berikutnya
            currentVideoIndex++;

            // [MODIFIKASI DI SINI] 
            // Jika sudah mencapai akhir playlist, lakukan REFRESH halaman untuk membersihkan RAM TV
            if (currentVideoIndex >= playlist.length) {
                console.log("Playlist selesai, merestart halaman untuk mencegah stuck...");
                location.reload(); 
                return; // Menghentikan eksekusi kode di bawahnya karena halaman sedang dimuat ulang
            }

            // Jika belum habis, lanjut putar video berikutnya
            playVideo(currentVideoIndex);
        });

        // Proteksi tambahan: Jika video macet di tengah karena kendala loading file/error internet
        videoElement.addEventListener('error', function() {
            console.log("Terjadi error pada video, mencoba refresh halaman...");
            setTimeout(function() {
                location.reload();
            }, 5000); // Tunggu 5 detik sebelum reload jika terjadi error
        });

        // Mulai putar video pertama saat halaman dibuka
        window.onload = function() {
            playVideo(currentVideoIndex);
        };
    </script>

</body>
</html>
