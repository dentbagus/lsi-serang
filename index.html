<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSI Serang</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <video id="videoPlayer" muted playsinline></video>

    <script>
        // DAFTAR VIDEO (Isi dengan link video kamu)
        const videoSources = [
            "include/assets/video/Toppoki_HD.mp4",
            "include/assets/video/DID Fresh Nutritious Sushi.mp4",
            "include/assets/video/DID Kimbap.mp4",
            "include/assets/video/DID SUSHI NATURE RECOMMENDATION.mp4",
            "include/assets/video/Salmon Nigiri_HD.mp4",
            "include/assets/video/Spicy Dakgangjeong_HD.mp4",
            "include/assets/video/Toppoki_HD.mp4"
        ];

        // MASUKKAN DURASI MANUAL DI SINI (Khusus TV, input manual jauh lebih aman dibanding load otomatis agar RAM TV tidak habis di awal)
        const playlist = [
            { src: videoSources[0], duration: 30 },
            { src: videoSources[1], duration: 15 },
            { src: videoSources[2], duration: 24 }
        ];

        const totalPlaylistDuration = playlist.reduce((sum, item) => sum + item.duration, 0);
        const videoElement = document.getElementById('videoPlayer');

        function syncVideo() {
            const currentEpochTime = Math.floor(Date.now() / 1000);
            const currentCycleTime = currentEpochTime % totalPlaylistDuration;

            let elapsed = 0;
            let targetVideoIndex = 0;
            let targetVideoTime = 0;

            for (let i = 0; i < playlist.length; i++) {
                if (currentCycleTime < elapsed + playlist[i].duration) {
                    targetVideoIndex = i;
                    targetVideoTime = currentCycleTime - elapsed;
                    break;
                }
                elapsed += playlist[i].duration;
            }

            const targetSrc = playlist[targetVideoIndex].src;

            if (videoElement.getAttribute('data-current-src') !== targetSrc) {
                videoElement.src = targetSrc;
                videoElement.setAttribute('data-current-src', targetSrc);
                videoElement.currentTime = targetVideoTime;
                videoElement.play().catch(e => console.log(e));
            }
        }

        // Ketika video selesai, langsung panggil fungsi sinkronisasi untuk memicu video berikutnya
        videoElement.addEventListener('ended', function() {
            syncVideo();
        });

        // Proteksi eror: Jika video macet karena buffer internet, coba paksa jalan lagi setelah 5 detik
        videoElement.addEventListener('error', function() {
            setTimeout(syncVideo, 5000);
        });

        window.onload = function() {
            syncVideo();
            
            // TV LG sering memblokir autoplay jika tidak ada interaksi awal.
            // Setelah web dibuka di TV, tekan tombol apa saja di remote (misal tombol OK/tengah) pada layar TV.
            document.body.addEventListener('click', () => {
                videoElement.play();
            }, { once: true });
        };
    </script>

</body>
</html>
